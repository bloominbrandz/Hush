<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hush Room</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #ffffff; color: #000000; overflow: hidden; height: 100vh; width: 100vw; }
.app-container { display: flex; height: 100vh; width: 100vw; position: relative; flex-direction: column; }
.top-loader { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: #e0e0e0; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
.top-loader.active { opacity: 1; }
.top-loader::after { content: ''; position: absolute; top: 0; left: 0; height: 100%; width: 30%; background: #000000; animation: loading 1s infinite ease-in-out; }
@keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }
.error-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; padding: 20px; text-align: center; }
.error-overlay.active { display: flex; }
.error-overlay h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #000000; }
.error-overlay p { color: #666666; margin-bottom: 2rem; font-size: 0.9rem; }
.btn { padding: 15px 30px; border: 2px solid #000000; background: #000000; color: #ffffff; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; font-weight: 600; }
.btn:hover { background: #ffffff; color: #000000; }
.video-grid { flex: 1; display: flex; flex-direction: column; width: 100%; height: calc(100% - 80px); }
.video-wrapper { position: relative; flex: 1; min-height: 0; background: #f5f5f5; overflow: hidden; border: 1px solid #000000; }
.video-wrapper:first-child { border-bottom: 2px solid #000000; }
video { width: 100%; height: 100%; object-fit: cover; display: block; background: #000000; }
#localVideo { transform: scaleX(-1); }
.video-placeholder { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #f5f5f5; color: #999999; font-size: 3rem; }
.video-label { position: absolute; bottom: 10px; left: 10px; background: #ffffff; color: #000000; padding: 6px 12px; font-size: 0.75rem; font-weight: 600; border: 1px solid #000000; }
/* FIX 6: Semi-transparent waiting overlay so user sees their camera */
.waiting-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255,255,255,0.8); color: #666666; text-align: center; padding: 20px; z-index: 5; backdrop-filter: blur(5px); }
.waiting-overlay.hidden { display: none; }
.waiting-overlay .icon { font-size: 2.5rem; margin-bottom: 10px; color: #000000; }
.waiting-overlay p { font-size: 0.85rem; margin-bottom: 8px; color: #333333; }
.share-code { background: #000000; color: #ffffff; padding: 12px 24px; font-family: 'Courier New', monospace; font-size: 1.3rem; letter-spacing: 3px; margin-top: 8px; border: 2px solid #000000; }
/* FIX 3: Click to unmute button for autoplay policy */
.unmute-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); color: #ffffff; z-index: 20; cursor: pointer; }
.unmute-overlay.active { display: flex; }
.unmute-overlay .icon { font-size: 3rem; margin-bottom: 15px; }
.unmute-overlay p { font-size: 1rem; font-weight: 600; }
.room-bar { position: absolute; top: 0; left: 0; right: 0; padding: 10px 15px; background: #ffffff; border-bottom: 1px solid #000000; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
.room-code { font-size: 0.75rem; font-weight: 600; background: #000000; color: #ffffff; padding: 6px 12px; border: 1px solid #000000; }
.connection-status { font-size: 0.7rem; padding: 5px 10px; font-weight: 600; border: 1px solid #000000; transition: all 0.3s; }
.status-connecting { background: #ffffff; color: #000000; }
.status-connected { background: #000000; color: #ffffff; }
.status-waiting { background: #f5f5f5; color: #000000; }
.status-error { background: #000000; color: #ffffff; }
.controls { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: #ffffff; border-top: 2px solid #000000; display: flex; align-items: center; justify-content: center; gap: 20px; padding: 0 20px; z-index: 100; }
.control-btn { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #000000; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #ffffff; color: #000000; transition: all 0.2s; font-size: 1.3rem; }
.control-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: #999999; }
.control-btn:active:not(:disabled) { transform: scale(0.95); }
.control-btn.muted { background: #000000; color: #ffffff; }
.control-btn.off { background: #000000; color: #ffffff; }
.control-btn.exit { background: #000000; color: #ffffff; }
.control-btn.exit:hover { background: #ffffff; color: #000000; }
.control-btn.chat-btn { background: #ffffff; color: #000000; }
.control-btn.chat-btn.has-new { animation: pulse 1s infinite; background: #000000; color: #ffffff; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
.chat-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 200; display: none; flex-direction: column; }
.chat-overlay.active { display: flex; }
.chat-header { padding: 15px 20px; background: #000000; color: #ffffff; border-bottom: 2px solid #000000; display: flex; justify-content: space-between; align-items: center; }
.chat-header h3 { font-size: 1rem; font-weight: 600; }
.close-chat { background: #ffffff; border: none; color: #000000; font-size: 1.5rem; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
.chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #f5f5f5; }
.message { max-width: 80%; padding: 12px 16px; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; border: 1px solid #000000; }
.message.received { background: #ffffff; color: #000000; align-self: flex-start; }
.message.sent { background: #000000; color: #ffffff; align-self: flex-end; }
.message-author { font-size: 0.7rem; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.chat-input-area { padding: 15px 20px; background: #ffffff; border-top: 2px solid #000000; display: flex; gap: 10px; }
.chat-input { flex: 1; padding: 12px 16px; border: 2px solid #000000; background: #ffffff; color: #000000; font-size: 1rem; }
.chat-input:focus { outline: none; background: #f5f5f5; }
.send-btn { width: 45px; height: 45px; border: 2px solid #000000; background: #000000; color: #ffffff; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.send-btn:hover { background: #ffffff; color: #000000; }
.send-btn:disabled { opacity: 0.3; border-color: #999999; }
.system-message { text-align: center; color: #666666; font-size: 0.8rem; font-style: italic; padding: 10px; }
/* FIX 7: Permission denied warning style */
.permission-warning { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000000; color: #ffffff; padding: 20px; border: 2px solid #000000; text-align: center; z-index: 15; max-width: 80%; }
.permission-warning button { margin-top: 10px; padding: 10px 20px; background: #ffffff; color: #000000; border: 2px solid #000000; cursor: pointer; font-weight: 600; }
@media (min-width: 768px) { .video-grid { flex-direction: row; } .video-wrapper:first-child { border-bottom: none; border-right: 2px solid #000000; } }
</style>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<base target="_blank">
</head>
<body>
<div class="error-overlay" id="errorOverlay">
<h1 id="errorTitle">Error</h1>
<p id="errorText">Something went wrong</p>
<button class="btn" onclick="window.location.href='index.html'">Go Back</button>
</div>
<div class="app-container" id="appContainer">
<div class="top-loader" id="topLoader"></div>
<div class="room-bar">
<div class="room-code" id="roomCodeDisplay">------</div>
<div class="connection-status status-connecting" id="connStatus">Loading...</div>
</div>
<div class="video-grid">
<div class="video-wrapper">
<div class="video-placeholder" id="remotePlaceholder">👤</div>
<!-- FIX 1: Removed muted attribute from remoteVideo -->
<video id="remoteVideo" autoplay playsinline style="display:none;"></video>
<!-- FIX 3: Click to unmute overlay for autoplay policy -->
<div class="unmute-overlay" id="unmuteOverlay" onclick="unmuteRemoteAudio()">
<div class="icon">🔇</div>
<p>Click to Enable Audio</p>
</div>
<div class="video-label" id="remoteLabel">Waiting...</div>
<!-- FIX 6: Semi-transparent waiting overlay -->
<div class="waiting-overlay" id="waitingOverlay">
<div class="icon">🔒</div>
<p>Share this code:</p>
<div class="share-code" id="shareCode">------</div>
<p style="margin-top: 15px; font-size: 0.75rem;">Waiting for someone...</p>
</div>
</div>
<div class="video-wrapper">
<div class="video-placeholder" id="localPlaceholder">📹</div>
<video id="localVideo" autoplay playsinline muted></video>
<div class="video-label">You</div>
<!-- FIX 7: Permission denied warning container -->
<div id="permissionWarning" style="display: none;"></div>
</div>
</div>
<div class="controls">
<button class="control-btn" id="micBtn" onclick="toggleMic()" disabled>🎤</button>
<button class="control-btn" id="camBtn" onclick="toggleCam()" disabled>📹</button>
<button class="control-btn exit" onclick="endCall()">📞</button>
<button class="control-btn chat-btn" id="chatBtn" onclick="toggleChat()" disabled>💬</button>
</div>
</div>
<div class="chat-overlay" id="chatOverlay">
<div class="chat-header">
<h3>💬 Chat</h3>
<button class="close-chat" onclick="toggleChat()">✕</button>
</div>
<div class="chat-messages" id="chatMessages"></div>
<div class="chat-input-area">
<input type="text" class="chat-input" id="chatInput" placeholder="Type..." onkeypress="handleKeyPress(event)">
<button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
</div>
</div>
<script>
// ==========================================
// FIXED WebRTC Config with TURN
// ==========================================
const rtcConfig = {
iceServers: [
{ urls: "stun:stun.l.google.com:19302" },
{ urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" },
{ urls: "turn:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" }
]
};

const urlParams = new URLSearchParams(window.location.search);
const roomCode = urlParams.get('room') || 'UNKNOWN';
const action = urlParams.get('action') || 'join';
const userId = 'user_' + Math.random().toString(36).substr(2, 9);

document.getElementById('roomCodeDisplay').textContent = roomCode;
document.getElementById('shareCode').textContent = roomCode;
document.title = `Hush ${roomCode}`;

let db, roomRef, chatRef;
let isHost = false;
let myRole = null;
let localStream = null;
let peerConnection = null;
let isMicMuted = false;
let isVideoOff = false;
let remoteJoined = false;
let unreadMessages = 0;
let initStarted = false;
let signalingStarted = false;

// FIX 2: ICE Candidate queues for both roles
let iceCandidateQueue = [];
let remoteDescriptionSet = false;

// FIX 3: Audio context and autoplay handling
let audioContext = null;
let remoteVideoElement = null;

if (document.getElementById('appContainer')) {
setTimeout(initApp, 50);
}

async function initApp() {
if (initStarted) return;
initStarted = true;
showLoader(true);
updateStatus('connecting', 'Connecting...');

try {
await initFirebase();
const canEnter = await validateRoom();
if (!canEnter) return;

// FIX 6: Initialize media BEFORE setting up signaling so user sees themselves while waiting
await initMedia();
await setupSignalingListeners();
setupChat();

updateStatus('waiting', isHost ? 'Waiting...' : 'Connecting...');
showLoader(false);
} catch (error) {
console.error('Init error:', error);
showError('Connection Failed', error.message || 'Please check your internet connection');
}
}

function initFirebase() {
return new Promise((resolve, reject) => {
try {
// FIX 4: Verify this matches your Firebase Console exactly
const config = {
apiKey: "AIzaSyA_BU9LoxbWa8GJr8Sjvog3-w2Qt6Mg3MM",
authDomain: "hush-8da1e.firebaseapp.com",
databaseURL: "https://hush-8da1e-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "hush-8da1e",
storageBucket: "hush-8da1e.firebasestorage.app",
messagingSenderId: "223355493095",
appId: "1:223355493095:web:c32e9cc7d9b5d33f9fa042"
};

if (!firebase.apps.length) {
firebase.initializeApp(config);
}
db = firebase.database();
resolve();
} catch (e) {
reject(e);
}
});
}

async function validateRoom() {
if (!roomCode || roomCode === 'UNKNOWN' || roomCode.length !== 6 || !/^[A-Z0-9]{6}$/.test(roomCode)) {
showError('Invalid Room', 'Room code must be 6 characters (A-Z, 0-9)');
return false;
}

roomRef = db.ref('rooms/' + roomCode);
const snapshot = await roomRef.once('value');
const roomData = snapshot.val();

if (action === 'create') {
if (roomData && roomData.host) {
showError('Room Exists', 'This room code is already in use');
return false;
}
await roomRef.set({ 
createdAt: firebase.database.ServerValue.TIMESTAMP, 
host: userId, 
guest: null, 
offer: null, 
answer: null,
iceCandidates: { host: {}, guest: {} } // FIX 5: Initialize ICE candidate structure
});
isHost = true;
myRole = 'host';
console.log('HOST: Room created', userId);
return true;
}

if (action === 'join') {
if (!roomData) {
showError('Room Not Found', 'This room does not exist. Check the code.');
return false;
}
if (!roomData.host) {
showError('Invalid Room', 'Room has no host. Create a new one.');
return false;
}
if (roomData.guest) {
showError('Room Full', 'Only 2 people allowed. Try another room.');
return false;
}
await roomRef.update({ guest: userId });
isHost = false;
myRole = 'guest';
roomRef.onDisconnect().update({ guest: null });
console.log('GUEST: Joined room', userId);
return true;
}
return false;
}

// FIX 7: Handle permission denied with fallback
async function initMedia() {
// Try audio + video first
const constraints = { 
video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, 
audio: true 
};

try {
localStream = await navigator.mediaDevices.getUserMedia(constraints);
setupLocalVideo();
} catch (error) {
console.warn('Audio+Video failed, trying video only:', error);
addSystemMessage('Microphone access denied. Trying video only...');

// Fallback to video only
const videoOnlyConstraints = { 
video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, 
audio: false 
};

try {
localStream = await navigator.mediaDevices.getUserMedia(videoOnlyConstraints);
setupLocalVideo();
// Show warning that audio is disabled
showAudioDisabledWarning();
} catch (videoError) {
console.error('Video also failed:', videoError);
addSystemMessage('Camera unavailable. Chat-only mode active.');
document.getElementById('chatBtn').disabled = false;
document.getElementById('sendBtn').disabled = false;
}
}
}

function setupLocalVideo() {
const localVideo = document.getElementById('localVideo');
localVideo.srcObject = localStream;
document.getElementById('localPlaceholder').style.display = 'none';
document.getElementById('micBtn').disabled = false;
document.getElementById('camBtn').disabled = false;
document.getElementById('chatBtn').disabled = false;
document.getElementById('sendBtn').disabled = false;
console.log('Media initialized');
}

function showAudioDisabledWarning() {
const warningDiv = document.getElementById('permissionWarning');
warningDiv.className = 'permission-warning';
warningDiv.innerHTML = `
<p>🔇 Audio is disabled because microphone permission was denied.</p>
<button onclick="this.parentElement.style.display='none'">OK</button>
`;
warningDiv.style.display = 'block';
// Disable mic button since we don't have audio
document.getElementById('micBtn').disabled = true;
}

async function setupSignalingListeners() {
if (signalingStarted) return;
signalingStarted = true;

if (isHost) {
setupHostListeners();
} else {
setupGuestListeners();
}
}

// HOST: Wait for guest, THEN create peer connection
function setupHostListeners() {
console.log('HOST: Setting up listeners');
document.getElementById('waitingOverlay').classList.remove('hidden');
roomRef.onDisconnect().remove();

// Listen for guest joining
roomRef.child('guest').on('value', async (snapshot) => {
const guestId = snapshot.val();
console.log('HOST: Guest status changed:', guestId);

if (guestId && !remoteJoined && !peerConnection) {
console.log('HOST: Guest joined, creating peer connection');
remoteJoined = true;

document.getElementById('waitingOverlay').classList.add('hidden');
document.getElementById('remoteLabel').textContent = 'Guest';
document.getElementById('remotePlaceholder').style.display = 'none';
document.getElementById('remoteVideo').style.display = 'block';
updateStatus('connected', 'Connecting...');
addSystemMessage('Guest joined! Connecting...');

try {
await createPeerConnection();
console.log('HOST: Creating offer');
const offer = await peerConnection.createOffer();
await peerConnection.setLocalDescription(offer);
console.log('HOST: Sending offer to Firebase');

await roomRef.child('offer').set({ 
type: offer.type, 
sdp: offer.sdp, 
from: userId, 
timestamp: firebase.database.ServerValue.TIMESTAMP 
});
console.log('HOST: Offer sent');
} catch (err) {
console.error('HOST: Error creating offer:', err);
addSystemMessage('Connection error. Retrying...');
}
} else if (!guestId && remoteJoined) {
handleDisconnect();
}
});

// Listen for answer from guest
roomRef.child('answer').on('value', async (snapshot) => {
const answer = snapshot.val();
if (answer && peerConnection) {
console.log('HOST: Received answer');
if (!peerConnection.currentRemoteDescription) {
try {
await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
remoteDescriptionSet = true; // FIX 2: Mark remote description as set
console.log('HOST: Remote description set');
updateStatus('connected', 'Live');

// FIX 2: Process queued ICE candidates
await processQueuedIceCandidates();
} catch (err) {
console.error('HOST: Error setting remote desc:', err);
}
}
}
});

// FIX 5: Listen for guest ICE candidates with child_added
roomRef.child('iceCandidates/guest').on('child_added', async (snapshot) => {
const candidate = snapshot.val();
console.log('HOST: Received guest ICE candidate');
await handleRemoteIceCandidate(candidate);
});
}

// GUEST: Listen for offer, create answer
function setupGuestListeners() {
console.log('GUEST: Setting up listeners');
document.getElementById('waitingOverlay').classList.add('hidden');
document.getElementById('remoteLabel').textContent = 'Host';
document.getElementById('remoteVideo').style.display = 'block';

// Listen for offer from host
roomRef.child('offer').on('value', async (snapshot) => {
const offer = snapshot.val();
if (offer && !peerConnection) {
console.log('GUEST: Received offer, creating peer connection');
try {
await createPeerConnection();
console.log('GUEST: Setting remote description');
await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
remoteDescriptionSet = true; // FIX 2: Mark remote description as set
console.log('GUEST: Remote description set');

// FIX 2: Process queued ICE candidates
await processQueuedIceCandidates();

console.log('GUEST: Creating answer');
const answer = await peerConnection.createAnswer();
await peerConnection.setLocalDescription(answer);
console.log('GUEST: Sending answer');

await roomRef.child('answer').set({ 
type: answer.type, 
sdp: answer.sdp, 
from: userId, 
timestamp: firebase.database.ServerValue.TIMESTAMP 
});
updateStatus('connected', 'Live');
addSystemMessage('Connected to host!');
} catch (err) {
console.error('GUEST: Error in signaling:', err);
}
}
});

// FIX 5: Listen for host ICE candidates with child_added
roomRef.child('iceCandidates/host').on('child_added', async (snapshot) => {
const candidate = snapshot.val();
console.log('GUEST: Received host ICE candidate');
await handleRemoteIceCandidate(candidate);
});

// Watch if host leaves
roomRef.child('host').on('value', (snapshot) => {
if (!snapshot.val() && remoteJoined) handleDisconnect();
});
}

// FIX 2: Handle remote ICE candidate with queueing support
async function handleRemoteIceCandidate(candidate) {
if (!candidate || !candidate.candidate) return;

if (peerConnection && remoteDescriptionSet) {
try {
await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
console.log(`${myRole}: Added remote ICE candidate`);
} catch (err) {
console.error(`${myRole}: Error adding ICE candidate:`, err);
}
} else {
console.log(`${myRole}: Queuing ICE candidate (remote description not set yet)`);
iceCandidateQueue.push(candidate);
}
}

// FIX 2: Process queued ICE candidates after remote description is set
async function processQueuedIceCandidates() {
console.log(`${myRole}: Processing ${iceCandidateQueue.length} queued ICE candidates`);
while (iceCandidateQueue.length > 0) {
const candidate = iceCandidateQueue.shift();
try {
await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
console.log(`${myRole}: Added queued ICE candidate`);
} catch (err) {
console.error(`${myRole}: Error adding queued ICE candidate:`, err);
}
}
}

async function createPeerConnection() {
console.log('Creating peer connection...');
peerConnection = new RTCPeerConnection(rtcConfig);

// Add local tracks
if (localStream) {
localStream.getTracks().forEach(track => {
console.log('Adding track:', track.kind);
peerConnection.addTrack(track, localStream);
});
}

// Handle remote stream
peerConnection.ontrack = (event) => {
console.log('ontrack fired!', event.streams);
const remoteVideo = document.getElementById('remoteVideo');
remoteVideoElement = remoteVideo;

if (event.streams && event.streams[0]) {
remoteVideo.srcObject = event.streams[0];
document.getElementById('remotePlaceholder').style.display = 'none';
remoteVideo.style.display = 'block';
remoteJoined = true;
console.log('Remote video set');

// FIX 3: Attempt to play and handle autoplay policy
remoteVideo.play().catch(err => {
console.warn('Autoplay prevented:', err);
showUnmuteOverlay();
});
}
};

// Handle ICE candidates - FIX 5: Use push() instead of set()
peerConnection.onicecandidate = (event) => {
if (event.candidate) {
console.log('Generated ICE candidate:', event.candidate.candidate.substring(0, 50) + '...');
const path = `iceCandidates/${myRole}`;
roomRef.child(path).push({ 
candidate: event.candidate.candidate, 
sdpMid: event.candidate.sdpMid, 
sdpMLineIndex: event.candidate.sdpMLineIndex, 
timestamp: firebase.database.ServerValue.TIMESTAMP 
}).then(() => {
console.log('ICE candidate pushed to Firebase');
}).catch(err => {
console.error('Failed to push ICE candidate:', err);
});
} else {
console.log('ICE candidate gathering complete');
}
};

// Connection state changes
peerConnection.onconnectionstatechange = () => {
console.log('Connection state:', peerConnection.connectionState);
if (peerConnection.connectionState === 'connected') {
console.log('PEERS CONNECTED!');
updateStatus('connected', 'Live');
}
if (peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed') {
handleDisconnect();
}
};

peerConnection.oniceconnectionstatechange = () => {
console.log('ICE connection state:', peerConnection.iceConnectionState);
};

peerConnection.onsignalingstatechange = () => {
console.log('Signaling state:', peerConnection.signalingState);
};

return peerConnection;
}

// FIX 3: Show unmute overlay when autoplay is blocked
function showUnmuteOverlay() {
const overlay = document.getElementById('unmuteOverlay');
overlay.classList.add('active');
}

// FIX 3: Unmute remote audio on user interaction
async function unmuteRemoteAudio() {
const remoteVideo = document.getElementById('remoteVideo');
const overlay = document.getElementById('unmuteOverlay');

try {
// Try to resume audio context if suspended
if (audioContext && audioContext.state === 'suspended') {
await audioContext.resume();
}

// Ensure video is playing with audio
remoteVideo.muted = false;
await remoteVideo.play();
overlay.classList.remove('active');
console.log('Audio enabled by user gesture');
addSystemMessage('Audio enabled');
} catch (err) {
console.error('Failed to unmute:', err);
}
}

function handleDisconnect() {
console.log('Handling disconnect');
remoteJoined = false;
remoteDescriptionSet = false; // FIX 2: Reset flag
iceCandidateQueue = []; // FIX 2: Clear queue

const remoteVideo = document.getElementById('remoteVideo');
remoteVideo.srcObject = null;
remoteVideo.style.display = 'none';
document.getElementById('remotePlaceholder').style.display = 'flex';
document.getElementById('waitingOverlay').classList.remove('hidden');
document.getElementById('remoteLabel').textContent = 'Waiting...';
document.getElementById('unmuteOverlay').classList.remove('active');
updateStatus('waiting', isHost ? 'Waiting...' : 'Reconnecting...');
addSystemMessage('User disconnected');

if (peerConnection) {
peerConnection.close();
peerConnection = null;
}
}

function setupChat() {
chatRef = roomRef.child('chat');
chatRef.limitToLast(50).on('child_added', (snapshot) => {
const msg = snapshot.val();
displayMessage(msg);
if (!document.getElementById('chatOverlay').classList.contains('active')) {
unreadMessages++;
updateChatBadge();
}
});
}

function displayMessage(data) {
const div = document.getElementById('chatMessages');
const el = document.createElement('div');
const isMe = data.userId === userId;
el.className = `message ${isMe ? 'sent' : 'received'}`;
el.innerHTML = `
<div class="message-author">${isMe ? 'You' : (data.userName || 'User')}</div>
${escapeHtml(data.text)}
`;
div.appendChild(el);
div.scrollTop = div.scrollHeight;
}

function addSystemMessage(text) {
const div = document.getElementById('chatMessages');
const el = document.createElement('div');
el.className = 'system-message';
el.textContent = text;
div.appendChild(el);
div.scrollTop = div.scrollHeight;
}

async function sendMessage() {
const input = document.getElementById('chatInput');
const text = input.value.trim();
if (!text || !chatRef) return;

await chatRef.push({ 
text: text, 
userId: userId, 
userName: myRole === 'host' ? 'Host' : 'Guest', 
timestamp: firebase.database.ServerValue.TIMESTAMP 
});
input.value = '';
}

function toggleMic() {
const btn = document.getElementById('micBtn');
if (!localStream) return;
const track = localStream.getAudioTracks()[0];
if (track) {
track.enabled = !track.enabled;
isMicMuted = !track.enabled;
btn.classList.toggle('muted', isMicMuted);
btn.textContent = isMicMuted ? '🚫' : '🎤';
}
}

function toggleCam() {
const btn = document.getElementById('camBtn');
if (!localStream) return;
const track = localStream.getVideoTracks()[0];
if (track) {
track.enabled = !track.enabled;
isVideoOff = !track.enabled;
btn.classList.toggle('off', isVideoOff);
btn.textContent = isVideoOff ? '🚫' : '📹';
}
}

async function endCall() {
if (localStream) localStream.getTracks().forEach(t => t.stop());
if (peerConnection) peerConnection.close();
if (isHost && roomRef) await roomRef.remove();
else if (roomRef) await roomRef.update({ guest: null });
window.location.href = 'index.html';
}

function toggleChat() {
const overlay = document.getElementById('chatOverlay');
overlay.classList.toggle('active');
if (overlay.classList.contains('active')) {
unreadMessages = 0;
updateChatBadge();
document.getElementById('chatInput').focus();
}
}

function updateChatBadge() {
const btn = document.getElementById('chatBtn');
btn.classList.toggle('has-new', unreadMessages > 0);
}

function updateStatus(type, text) {
const el = document.getElementById('connStatus');
el.className = 'connection-status status-' + type;
el.textContent = text;
}

function showLoader(show) {
document.getElementById('topLoader').classList.toggle('active', show);
}

function showError(title, text) {
document.getElementById('errorTitle').textContent = title;
document.getElementById('errorText').textContent = text;
document.getElementById('errorOverlay').classList.add('active');
showLoader(false);
}

function handleKeyPress(e) {
if (e.key === 'Enter') sendMessage();
}

function escapeHtml(text) {
const div = document.createElement('div');
div.textContent = text;
return div.innerHTML;
}

window.addEventListener('beforeunload', async () => {
if (isHost && roomRef) await roomRef.remove();
else if (roomRef) await roomRef.update({ guest: null });
});
</script>
</body>
</html>
