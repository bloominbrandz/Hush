<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Create Room - Hush</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 2rem;
            border: 2px solid #000000;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .security-notice {
            background: #f5f5f5;
            border: 1px solid #000000;
            padding: 12px;
            font-size: 0.8rem;
            color: #333333;
            text-align: left;
            margin-bottom: 15px;
        }
        .security-notice strong { color: #000000; }
        .error, .success {
            padding: 12px;
            margin: 10px 0;
            font-weight: 600;
            display: none;
            font-size: 0.9rem;
        }
        .error {
            background: #ffcccc;
            color: #000000;
            border: 1px solid #ff0000;
        }
        .success {
            background: #ccffcc;
            color: #000000;
            border: 1px solid #00aa00;
        }
        .custom-code-section {
            margin-bottom: 15px;
            padding: 15px;
            border: 2px dashed #000000;
            background: #fafafa;
        }
        .custom-code-section h3 {
            margin-bottom: 10px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #000000;
        }
        .custom-code-input {
            display: flex;
            gap: 0;
            align-items: stretch;
            margin-bottom: 10px;
        }
        .custom-code-input input {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            letter-spacing: 2px;
            text-align: center;
            border: 2px solid #000000;
            border-right: none;
            background: #ffffff;
            color: #000000;
        }
        .custom-code-input input:focus {
            outline: none;
            background: #f5f5f5;
        }
        .custom-code-input button {
            padding: 0 20px;
            font-size: 0.85rem;
            border: 2px solid #000000;
            border-left: none;
            background: #000000;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-weight: 600;
        }
        .custom-code-input button:hover:not(:disabled) {
            background: #ffffff;
            color: #000000;
        }
        .custom-code-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .checking-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .divider {
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #666666;
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #000000;
        }
        .code-display {
            background: #000000;
            color: #ffffff;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
            border: 2px solid #000000;
        }
        .code-label {
            font-size: 0.75rem;
            opacity: 0.9;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .room-code {
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 6px;
            font-family: 'Courier New', monospace;
        }
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .copy-btn:hover {
            background: #f5f5f5;
        }
        .btn-primary, .btn-secondary {
            width: 100%;
            padding: 15px;
            border: 2px solid #000000;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 10px;
            transition: all 0.3s;
            font-size: 0.9rem;
            background: #000000;
            color: #ffffff;
        }
        .btn-primary:hover:not(:disabled) {
            background: #ffffff;
            color: #000000;
        }
        .btn-primary:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #ffffff;
            color: #000000;
        }
        .btn-secondary:hover {
            background: #000000;
            color: #ffffff;
        }
        .copied {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000;
            color: #ffffff;
            padding: 12px 24px;
            display: none;
            font-weight: 600;
            z-index: 1000;
        }
        .availability-status {
            font-size: 0.8rem;
            color: #666666;
            margin-top: 8px;
            min-height: 20px;
        }
        .availability-status.available {
            color: #00aa00;
        }
        .availability-status.taken {
            color: #ff0000;
        }
        .availability-status.checking {
            color: #ff9500;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="copied" id="copiedMsg">Copied!</div>
    <div class="container">
        <div class="security-notice">
            <strong>🔒 Private:</strong> Rooms auto-delete when both users leave.
        </div>
        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>
        
        <div class="custom-code-section">
            <h3>Custom Code</h3>
            <div class="custom-code-input">
                <input type="text" id="customCodeInput" maxlength="6" placeholder="6 chars" autocomplete="off">
                <button id="checkBtn" onclick="checkAvailability()">
                    <span id="checkBtnText">Check</span>
                </button>
            </div>
            <div class="availability-status" id="availabilityStatus"></div>
        </div>
        
        <div class="divider">Or</div>
        
        <div class="code-display">
            <div class="code-label">Your Room Code</div>
            <div class="room-code" id="roomCode">------</div>
            <button class="copy-btn" onclick="copyCode()">Copy</button>
        </div>
        
        <button class="btn-primary" id="enterBtn" onclick="enterRoom()">Enter Room</button>
        <button class="btn-secondary" onclick="window.location.href='index.html'">Back</button>
    </div>

    <script>
        // FIXED: Asia-Southeast1 region URL
        const firebaseConfig = {
            apiKey: "AIzaSyA_BU9LoxbWa8GJr8Sjvog3-w2Qt6Mg3MM",
            authDomain: "hush-8da1e.firebaseapp.com",
            databaseURL: "https://hush-8da1e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "hush-8da1e",
            storageBucket: "hush-8da1e.firebasestorage.app",
            messagingSenderId: "223355493095",
            appId: "1:223355493095:web:c32e9cc7d9b5d33f9fa042"
        };

        // SAFE: Only initialize once
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
        
        let currentCode = '';
        let isCodeAvailable = false;
        
        const urlParams = new URLSearchParams(window.location.search);
        const customCodeFromURL = urlParams.get('custom');

        function generateCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        function isValidCode(code) {
            return /^[A-Z0-9]{6}$/.test(code);
        }

        async function initRoom() {
            currentCode = generateCode();
            document.getElementById('roomCode').textContent = currentCode;
            isCodeAvailable = true;
            
            if (customCodeFromURL && isValidCode(customCodeFromURL)) {
                document.getElementById('customCodeInput').value = customCodeFromURL;
                await checkAvailability();
            }
        }

        async function checkAvailability() {
            const input = document.getElementById('customCodeInput');
            const code = input.value.trim().toUpperCase();
            const statusDiv = document.getElementById('availabilityStatus');
            const checkBtn = document.getElementById('checkBtn');
            const checkBtnText = document.getElementById('checkBtnText');
            
            hideMessages();

            if (!code) {
                currentCode = document.getElementById('roomCode').textContent;
                isCodeAvailable = true;
                statusDiv.textContent = 'Using random code above';
                statusDiv.className = 'availability-status available';
                return;
            }

            if (!isValidCode(code)) {
                showError('6 chars: A-Z, 0-9 only');
                statusDiv.textContent = 'Invalid code format';
                statusDiv.className = 'availability-status taken';
                isCodeAvailable = false;
                return;
            }

            checkBtn.disabled = true;
            checkBtnText.innerHTML = 'Checking<span class="checking-spinner"></span>';
            statusDiv.textContent = 'Checking availability...';
            statusDiv.className = 'availability-status checking';

            try {
                const roomRef = db.ref('rooms/' + code);
                const snapshot = await roomRef.once('value');
                
                if (snapshot.exists()) {
                    statusDiv.textContent = '❌ Code already taken';
                    statusDiv.className = 'availability-status taken';
                    isCodeAvailable = false;
                    showError('This room code is already in use!');
                } else {
                    currentCode = code;
                    document.getElementById('roomCode').textContent = currentCode;
                    statusDiv.textContent = '✅ Code available!';
                    statusDiv.className = 'availability-status available';
                    isCodeAvailable = true;
                    showSuccess(`"${currentCode}" is ready!`);
                }
            } catch (e) {
                console.error(e);
                statusDiv.textContent = 'Error checking';
                statusDiv.className = 'availability-status taken';
                isCodeAvailable = false;
                showError('Connection error. Try again.');
            } finally {
                checkBtn.disabled = false;
                checkBtnText.textContent = 'Check';
            }
        }

        function enterRoom() {
            if (!currentCode || currentCode === '------' || currentCode.length !== 6) {
                showError('Invalid room code!');
                return;
            }
            
            if (!isCodeAvailable) {
                showError('Please check code availability first!');
                return;
            }
            
            window.location.href = `room.html?room=${currentCode}&action=create`;
        }

        // SAFE: Null check before adding listener
        document.addEventListener('DOMContentLoaded', () => {
            const customInput = document.getElementById('customCodeInput');
            if (customInput) {
                customInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') checkAvailability();
                });
            }
            initRoom();
        });

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 3000);
        }

        function showSuccess(msg) {
            const successDiv = document.getElementById('successMsg');
            successDiv.textContent = msg;
            successDiv.style.display = 'block';
            setTimeout(() => successDiv.style.display = 'none', 3000);
        }

        function hideMessages() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }

        function copyCode() {
            if (!currentCode || currentCode === '------') {
                showError('No code to copy!');
                return;
            }
            
            navigator.clipboard.writeText(currentCode).then(() => {
                const msg = document.getElementById('copiedMsg');
                msg.style.display = 'block';
                setTimeout(() => msg.style.display = 'none', 2000);
            }).catch(() => {
                const textArea = document.createElement('textarea');
                textArea.value = currentCode;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                const msg = document.getElementById('copiedMsg');
                msg.style.display = 'block';
                setTimeout(() => msg.style.display = 'none', 2000);
            });
        }
    </script>
</body>
</html>
