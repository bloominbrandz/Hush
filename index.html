<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hush - Private Video Call</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #111;
            padding: 2rem;
            border: 2px solid #333;
            text-align: center;
            max-width: 400px;
            width: 100%;
            border-radius: 12px;
        }
        .logo {
            margin-bottom: 1.5rem;
            font-size: 3rem;
        }
        .security-notice {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: left;
            border-radius: 8px;
        }
        .security-notice h3 {
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .security-notice p {
            font-size: 0.8rem;
            color: #888;
            line-height: 1.4;
        }
        .section {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #222;
        }
        .section:last-of-type {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .section-title {
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }
        .input-group {
            margin-bottom: 0.75rem;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #333;
            font-size: 1.1rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s;
            background: #000;
            color: #fff;
            border-radius: 8px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #fff;
            background: #111;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: 2px solid #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
        }
        .btn-primary {
            background: #fff;
            color: #000;
        }
        .btn-primary:hover {
            background: #000;
            color: #fff;
        }
        .btn-secondary {
            background: transparent;
            color: #fff;
            margin-top: 0.5rem;
        }
        .btn-secondary:hover {
            background: #fff;
            color: #000;
        }
        .error {
            color: #ff4444;
            margin-top: 1rem;
            display: none;
            font-weight: 600;
            background: rgba(255, 68, 68, 0.1);
            padding: 12px;
            border: 1px solid #ff4444;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .info-text {
            font-size: 0.75rem;
            color: #666;
            margin-top: 0.5rem;
        }
    </style>
    <base target="_blank">
</head>
<body>
    <div class="container">
        <div class="logo">🔒</div>
        
        <div class="security-notice">
            <h3>Private & Ephemeral</h3>
            <p>1-on-1 video calls that vanish when you leave. No history. No traces.</p>
        </div>
        
        <div class="section">
            <div class="section-title">Join Private Room</div>
            <div class="input-group">
                <input type="text" id="joinRoomCode" placeholder="ROOM CODE" maxlength="6">
            </div>
            <button class="btn btn-primary" onclick="joinRoom()">Join Room</button>
            <p class="info-text">Enter 6-character code</p>
        </div>
        
        <div class="section">
            <div class="section-title">Create Room</div>
            <div class="input-group">
                <input type="text" id="customRoomCode" placeholder="CUSTOM CODE" maxlength="6">
            </div>
            <button class="btn btn-secondary" onclick="createCustomRoom()">Create Custom</button>
        </div>
        
        <div class="section">
            <button class="btn btn-primary" onclick="window.location.href='create.html'">Random Room</button>
        </div>
        
        <p class="error" id="errorMsg"></p>
    </div>

    <script>
        function joinRoom() {
            const code = document.getElementById('joinRoomCode').value.trim().toUpperCase();
            const errorMsg = document.getElementById('errorMsg');
            
            // Sanitization: Must be exactly 6 chars
            if (code.length !== 6 || !/^[A-Z0-9]{6}$/.test(code)) {
                errorMsg.textContent = 'Enter valid 6-character code (A-Z, 0-9)';
                errorMsg.style.display = 'block';
                setTimeout(() => errorMsg.style.display = 'none', 3000);
                return;
            }
            
            // Always pass action=join for joining existing rooms
            window.location.href = `room.html?room=${code}&action=join`;
        }
        
        function createCustomRoom() {
            const code = document.getElementById('customRoomCode').value.trim().toUpperCase();
            const errorMsg = document.getElementById('errorMsg');
            
            // Sanitization
            if (code.length !== 6 || !/^[A-Z0-9]{6}$/.test(code)) {
                errorMsg.textContent = '6 chars: A-Z or 0-9 only';
                errorMsg.style.display = 'block';
                setTimeout(() => errorMsg.style.display = 'none', 3000);
                return;
            }
            
            // Pass to create.html for availability check, then room.html will create as host
            window.location.href = `create.html?custom=${code}`;
        }
        
        document.getElementById('joinRoomCode').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') joinRoom();
        });
        
        document.getElementById('customRoomCode').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') createCustomRoom();
        });
        
        document.getElementById('customRoomCode').addEventListener('input', function(e) {
            this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        });
        
        document.getElementById('joinRoomCode').addEventListener('input', function(e) {
            this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        });
    </script>
</body>
</html>
