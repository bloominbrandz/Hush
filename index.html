<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hush - Private Video Call</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 2rem;
            border: 2px solid #000000;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            margin-bottom: 1.5rem;
            font-size: 3rem;
        }
        .security-notice {
            background: #f5f5f5;
            border: 1px solid #000000;
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .security-notice h3 {
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            color: #000000;
        }
        .security-notice p {
            font-size: 0.8rem;
            color: #333333;
            line-height: 1.4;
        }
        .section {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e0e0e0;
        }
        .section:last-of-type {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .section-title {
            font-size: 0.75rem;
            color: #666666;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }
        .input-group {
            margin-bottom: 0.75rem;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #000000;
            font-size: 1.1rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s;
            background: #ffffff;
            color: #000000;
        }
        input[type="text"]:focus {
            outline: none;
            background: #f5f5f5;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: 2px solid #000000;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #000000;
            color: #ffffff;
        }
        .btn:hover {
            background: #ffffff;
            color: #000000;
        }
        .btn-secondary {
            background: #ffffff;
            color: #000000;
        }
        .btn-secondary:hover {
            background: #000000;
            color: #ffffff;
        }
        .error {
            color: #000000;
            margin-top: 1rem;
            display: none;
            font-weight: 600;
            background: #ffcccc;
            padding: 12px;
            border: 1px solid #ff0000;
            font-size: 0.9rem;
        }
        .info-text {
            font-size: 0.75rem;
            color: #666666;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔒</div>
        
        <div class="security-notice">
            <h3>Private & Ephemeral</h3>
            <p>1-on-1 video calls that vanish when you leave. No history. No traces.</p>
        </div>
        
        <div class="section">
            <div class="section-title">Join Private Room</div>
            <div class="input-group">
                <input type="text" id="joinRoomCode" placeholder="ROOM CODE" maxlength="6">
            </div>
            <button class="btn" onclick="joinRoom()">Join Room</button>
            <p class="info-text">Enter 6-character code</p>
        </div>
        
        <div class="section">
            <div class="section-title">Create Room</div>
            <div class="input-group">
                <input type="text" id="customRoomCode" placeholder="CUSTOM CODE" maxlength="6">
            </div>
            <button class="btn btn-secondary" onclick="createCustomRoom()">Create Custom</button>
        </div>
        
        <div class="section">
            <button class="btn" onclick="window.location.href='create.html'">Random Room</button>
        </div>
        
        <p class="error" id="errorMsg"></p>
    </div>

    <script>
        // SAFE: Null checks before adding listeners
        const joinRoomCode = document.getElementById('joinRoomCode');
        const customRoomCode = document.getElementById('customRoomCode');
        
        if (joinRoomCode) {
            joinRoomCode.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') joinRoom();
            });
            joinRoomCode.addEventListener('input', function(e) {
                this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            });
        }
        
        if (customRoomCode) {
            customRoomCode.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') createCustomRoom();
            });
            customRoomCode.addEventListener('input', function(e) {
                this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            });
        }
        
        function joinRoom() {
            const code = joinRoomCode ? joinRoomCode.value.trim().toUpperCase() : '';
            const errorMsg = document.getElementById('errorMsg');
            
            if (code.length !== 6 || !/^[A-Z0-9]{6}$/.test(code)) {
                errorMsg.textContent = 'Enter valid 6-character code (A-Z, 0-9)';
                errorMsg.style.display = 'block';
                setTimeout(() => errorMsg.style.display = 'none', 3000);
                return;
            }
            
            window.location.href = `room.html?room=${code}&action=join`;
        }
        
        function createCustomRoom() {
            const code = customRoomCode ? customRoomCode.value.trim().toUpperCase() : '';
            const errorMsg = document.getElementById('errorMsg');
            
            if (code.length !== 6 || !/^[A-Z0-9]{6}$/.test(code)) {
                errorMsg.textContent = '6 chars: A-Z or 0-9 only';
                errorMsg.style.display = 'block';
                setTimeout(() => errorMsg.style.display = 'none', 3000);
                return;
            }
            
            window.location.href = `create.html?custom=${code}`;
        }
    </script>
</body>
</html>
